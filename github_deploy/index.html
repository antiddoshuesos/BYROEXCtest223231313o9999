<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BYROEXC - Premium Crypto Exchange & Wallet. Trade, manage, and grow your crypto portfolio.">
  <title>BYROEXC — Crypto Exchange & Wallet</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/trading.css">
  <link rel="stylesheet" href="css/wallet.css">

  <style>
    /* Toggle switch component */
    .toggle {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle__slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 24px;
      transition: all 0.3s;
    }
    .toggle__slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.3s;
    }
    .toggle input:checked + .toggle__slider {
      background: var(--accent-primary);
    }
    .toggle input:checked + .toggle__slider::before {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <!-- Electron Title Bar -->
  <div class="title-bar">
    <div class="title-bar__brand">
      <div style="width:16px; height:16px; border-radius:4px; background:linear-gradient(135deg, var(--accent-primary), var(--accent-blue)); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:900; color:#0a0e17;">B</div>
      BYROEXC
    </div>
    <div class="title-bar__controls">
      <button class="title-bar__btn" id="window-minimize">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
      </button>
      <button class="title-bar__btn" id="window-maximize">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      </button>
      <button class="title-bar__btn title-bar__btn--close" id="window-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- App Layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar__logo">
        <div class="sidebar__logo-icon">B</div>
        <span class="sidebar__logo-text">BYROEXC</span>
      </div>

      <div class="sidebar__nav">
        <div class="sidebar__section-label">Main</div>

        <div class="sidebar__nav-item active" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </div>

        <div class="sidebar__nav-item" data-page="trading">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 17l10-10 4 4 6-6"/>
            <path d="M18 7h4v4"/>
          </svg>
          <span>Trade</span>
        </div>

        <div class="sidebar__nav-item" data-page="wallet">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 10H2"/>
            <circle cx="18" cy="15" r="1"/>
          </svg>
          <span>Wallet</span>
        </div>

        <div class="sidebar__nav-item" data-page="markets">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/>
          </svg>
          <span>Markets</span>
          <span class="badge">Live</span>
        </div>

        <div class="sidebar__section-label">Account</div>

        <div class="sidebar__nav-item" data-page="portfolio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-6.219-8.56"/>
            <path d="M21 3v5h-5"/>
          </svg>
          <span>Portfolio</span>
        </div>

        <div class="sidebar__nav-item" data-page="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <span>Settings</span>
        </div>
      </div>

      <!-- Sidebar Footer -->
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__user-avatar">B</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name">BYRO User</div>
            <div class="sidebar__user-email">byro@byroexc.com</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="header">
        <div class="header__left">
          <h1 class="header__page-title">Dashboard</h1>
          <div class="header__search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" placeholder="Search coins, pairs, markets..." id="global-search">
          </div>
        </div>
        <div class="header__right">
          <button class="header__icon-btn" title="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span class="notification-dot"></span>
          </button>
          <button class="header__icon-btn" title="Connect Wallet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M22 10H2"/>
            </svg>
          </button>
          <div style="width:1px; height:20px; background:var(--border-primary); margin: 0 4px;"></div>
          <div style="display:flex; align-items:center; gap:8px; padding:4px 12px; border-radius: var(--radius-full); background: rgba(var(--accent-primary-rgb), 0.08); cursor: pointer;">
            <div class="live-dot" style="width:6px; height:6px;"></div>
            <span style="font-size: var(--fs-sm); font-weight: 600; color: var(--accent-primary);">Connected</span>
          </div>
        </div>
      </header>

      <!-- Page Container -->
      <div class="page-container" id="page-container">
        <!-- Pages rendered dynamically here -->
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/trading.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/markets.js"></script>
  <script src="js/portfolio.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
